model = "gpt-5.5"
model_supports_reasoning_summaries = true
model_provider = "openai"
model_reasoning_effort = "medium"
disable_response_storage = false
flex_mode = false
approval_policy = "never"
sandbox_mode = "workspace-write"
network_access = true

[tui]
notifications = true

[sandbox_workspace_write]
writable_roots = ["/tmp", "/Users/robert/.pyenv/shims"]

[model_providers.openrouter]
name = "OpenRouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "OPENROUTER_API_KEY"

[model_providers.azure]
name = "AzureOpenAI"
base_url = "https://YOUR_PROJECT_NAME.openai.azure.com/openai"
env_key = "AZURE_OPENAI_API_KEY"

[model_providers.gemini]
name = "Gemini"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai"
env_key = "GEMINI_API_KEY"

[model_providers.mistral]
name = "Mistral"
base_url = "https://api.mistral.ai/v1"
env_key = "MISTRAL_API_KEY"

[model_providers.deepseek]
name = "DeepSeek"
base_url = "https://api.deepseek.com"
env_key = "DEEPSEEK_API_KEY"

[model_providers.xai]
name = "xAI"
base_url = "https://api.x.ai/v1"
env_key = "XAI_API_KEY"

[model_providers.groq]
name = "Groq"
base_url = "https://api.groq.com/openai/v1"
env_key = "GROQ_API_KEY"

[model_providers.arceeai]
name = "ArceeAI"
base_url = "https://conductor.arcee.ai/v1"
env_key = "ARCEEAI_API_KEY"

[history]
persistence = "save-all"

[notice.model_migrations]
"gpt-5.1-codex-max" = "codex-auto-balanced"

[features]
unified_exec = true
shell_snapshot = true
steer = true
rmcp_client = true
apps = true

[mcp_servers.playwright]
args = ["@playwright/mcp@latest"]
command = "npx"

[projects."/Users/robert"]
trust_level = "trusted"

# Attempt to define agent personas to speed up implementation.
[agents.default]
description = "Default agent."
model = "gpt-5.5"
spawn_mode = "fork"
config_file = "./agents/default.toml"

[agents.explorer]
description = "Use `explorer` for specific, well-scoped codebase questions.\nPrefer this role when you want fast authoritative repository answers rather than implementation work.\n"
model = "gpt-5.5"
spawn_mode = "spawn"
config_file = "./agents/explorer.toml"

[agents.fast-worker]
description = "Use `fast-worker` for tightly constrained execution tasks.\nPrefer this role for small localized fixes or short command sequences from a self-contained prompt.\n"
model = "gpt-5.4-mini"
spawn_mode = "spawn"
config_file = "./agents/fast-worker.toml"

[agents.awaiter]
description = "Use `awaiter` for commands or tasks that may take a while to finish.\nPrefer this role for waiting, polling, or long-running monitoring work.\n"
model = "gpt-5.4-mini"
spawn_mode = "spawn"
config_file = "./agents/awaiter.toml"
