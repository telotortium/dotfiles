## Stolen from http://mutelight.org/practical-tmux
# C-b is not acceptable -- Vim uses it
unbind C-b
set-option -g prefix C-a
bind-key C-a last-window

# Start numbering at 1
set -g base-index 1

# Allows for faster key repetition, but keep at 10 ms to ensure that XTerm
# control sequences are recognized as such instead of being leaked to the
# terminal. See
# https://www.reddit.com/r/vscode/comments/1evi4er/comment/liuk7pu/
set -s escape-time 10

# Set status bar
set -g status-bg black
set -g status-fg white
set -g status-left ""
set -g status-right "#[fg=blue]#H"

# Set terminal title
set-option -g set-titles on
set-option -g set-titles-string "#h #S / #W"

# Increase size of history
set -g history-limit 10000

## Rather than constraining window size to the maximum size of any client
## connected to the *session*, constrain window size to the maximum size of any
## client connected to *that window*. Much more reasonable.
setw -g aggressive-resize off

# Allows us to use C-a a <command> to send commands to a TMUX session inside
# another TMUX session
bind-key a send-prefix

# Activity monitoring
#setw -g monitor-activity on
#set -g visual-activity on

# Example of using a shell command in the status line
#set -g status-right "#[fg=yellow]#(uptime | cut -d ',' -f 2-)"

# Highlight active window
set-window-option -g window-status-current-style bg=red

## Ensure 256-color terminal
set -g default-terminal "tmux-256color"

## Vi keys
set -g status-keys vi
setw -g mode-keys vi
set -s copy-command "$HOME/bin/yank"

# Keep mouse selection active in copy-mode; press `y` to yank.
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection
bind -T copy-mode MouseDragEnd1Pane send-keys -X stop-selection
bind -T copy-mode-vi y send-keys -X copy-pipe
bind -T copy-mode y send-keys -X copy-pipe

# OSC 52 configuration
# Enable OSC 52 to work in vim using https://github.com/ojroques/vim-oscyank
set -g set-clipboard on
# Force OSC 52 to work in Mosh 1.4.0, tmux 3.3a (see
# https://github.com/mobile-shell/mosh/pull/1054#issuecomment-1303725548).
set-option -ag terminal-overrides ",xterm-256color:Ms=\\E]52;c;%p2%s\\7"

# Common Linux desktop environment variables, as well as COLORFGBG, which is
# used by Vim to determine if the terminal has a light or dark background.
set -ga update-environment ' DESKTOP_SESSION DESKTOP_STARTUP_ID DBUS_SESSION_BUS_ADDRESS VIM_SERVERNAME COLORFGBG UPSTART_SESSION'

# Visual Studio Code environment variables, so you can run `code <file>` and
# have it work.
set -ga update-environment ' VSCODE_GIT_ASKPASS_NODE VSCODE_GIT_ASKPASS_EXTRA_ARGS VSCODE_GIT_IPC_HANDLE VSCODE_GIT_ASKPASS_MAIN VSCODE_IPC_HOOK_CLI'

# Variable to determine if terminal is using Mosh
set -ga update-environment ' MOSH_CONNECTION'

set -g terminal-overrides 'xterm*:Tc:smcup@:rmcup@,screen*:Tc:smcup@:rmcup@,st*:Tc:smcup@:rmcup@,putty*:smcup@:rmcup@'

set -g mouse on

# Toggle mouse on with ^B m
bind m \
  set -g mouse on \;\
  display 'Mouse: ON'

# Toggle mouse off with ^B M
bind M \
  set -g mouse off \;\
  display 'Mouse: OFF'

unbind +
bind + \
  new-window -d -n tmux-zoom 'clear && echo TMUX ZOOM && read' \;\
  swap-pane -s tmux-zoom.0 \;\
  select-window -t tmux-zoom

unbind -
bind - \
  last-window \;\
  swap-pane -s tmux-zoom.0 \;\
  kill-window -t tmux-zoom

bind C-n next-window
bind C-p previous-window

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
#
# The upstream plugin uses process detection to decide whether to pass Ctrl-hjkl
# through to the foreground app or let tmux navigate panes. Keep that behavior,
# but also treat alternate-screen TUIs and Codex-like CLIs as pass-through so
# tmux does not steal Ctrl-j from Shift+Enter in the Codex app.
set -g @navigator_process_pattern '((\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?|codex|claude|aider)'
bind-key -n C-h if-shell "[ '#{alternate_on}' = '1' ] || ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +#{@navigator_process_pattern}$'" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "[ '#{alternate_on}' = '1' ] || ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +#{@navigator_process_pattern}$'" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "[ '#{alternate_on}' = '1' ] || ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +#{@navigator_process_pattern}$'" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "[ '#{alternate_on}' = '1' ] || ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +#{@navigator_process_pattern}$'" 'send-keys C-l' 'select-pane -R'
bind C-l send-keys 'C-l'

bind -n C-s swap-window -s "!"

# For iTerm2 shell integration
# (https://gitlab.com/gnachman/iterm2/-/wikis/tmux-Integration-Best-Practices#how-do-i-use-shell-integration)
set-option -g allow-passthrough on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# run '~/.tmux/plugins/tpm/tpm'
